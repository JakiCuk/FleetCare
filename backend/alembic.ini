# Alembic configuration for FleetCare.
#
# The database URL is resolved at runtime from the DATABASE_URL environment
# variable inside ``alembic/env.py`` (NOT here), so ``sqlalchemy.url`` is left
# empty. Run from the ``backend/`` directory: ``alembic upgrade head``.

[alembic]
# Path to migration scripts (relative to this file's directory).
script_location = alembic

# Template used to generate migration file names; the date prefix keeps them
# ordered chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Treat naive timestamps in migration file headers as UTC.
timezone = UTC

# Resolved in env.py from DATABASE_URL; left blank intentionally.
sqlalchemy.url =

# Detect column type changes during autogenerate.
# (informational; effective config is set in env.py context.configure)

[post_write_hooks]
# No automatic formatting hooks (kept minimal for CI determinism).

# ── Logging ───────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
