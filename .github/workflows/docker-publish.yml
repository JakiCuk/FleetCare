# Build & publish FleetCare Docker images to GitHub Container Registry (GHCR).
# Images: ghcr.io/<owner>/fleetcare-backend and .../fleetcare-frontend
# Tags:   <yyyymmddhhmm> (build time, UTC) + latest
#
# Pull & run afterwards — one command (see docker-compose.ghcr.yml):
#   docker login ghcr.io        # only if the package is private
#   docker compose -f docker-compose.ghcr.yml up -d

name: Publish Docker images (GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      owner_lc: ${{ steps.v.outputs.owner_lc }}
    steps:
      - id: v
        run: |
          echo "version=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            build_args: |
              BUILD_VERSION=${{ needs.meta.outputs.version }}
          - name: frontend
            context: ./frontend
            build_args: |
              VITE_BUILD_VERSION=${{ needs.meta.outputs.version }}
              VITE_API_BASE=/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ needs.meta.outputs.owner_lc }}/fleetcare-${{ matrix.name }}:${{ needs.meta.outputs.version }}
            ghcr.io/${{ needs.meta.outputs.owner_lc }}/fleetcare-${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
