# Override: run pre-built GHCR images instead of building locally.
# Requires Docker Compose v2.20+ (for the `!reset` tag).
#
# Usage:
#   docker login ghcr.io                      # only if the package is private
#   export GHCR_OWNER=jakicuk                 # GHCR namespace (lowercase)
#   export BUILD_VERSION=latest               # or a specific yyyymmddhhmm tag
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#
# Backend, worker and beat share the backend image.

services:
  backend:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-jakicuk}/fleetcare-backend:${BUILD_VERSION:-latest}
    pull_policy: always

  worker:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-jakicuk}/fleetcare-backend:${BUILD_VERSION:-latest}
    pull_policy: always

  beat:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-jakicuk}/fleetcare-backend:${BUILD_VERSION:-latest}
    pull_policy: always

  frontend:
    build: !reset null
    image: ghcr.io/${GHCR_OWNER:-jakicuk}/fleetcare-frontend:${BUILD_VERSION:-latest}
    pull_policy: always
